<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neta Cards</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111317;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: 90%;
      max-width: 420px;
      background: #1a1d24;
      border: 1px solid #2c3240;
      border-radius: 20px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 28px;
    }
    p {
      color: #b9c0cc;
      margin-bottom: 24px;
    }
    a {
      display: block;
      text-decoration: none;
      color: white;
      background: #242a36;
      border: 1px solid #394154;
      padding: 14px 18px;
      border-radius: 14px;
      margin: 12px 0;
      font-weight: 600;
    }
    a:hover {
      background: #2c3442;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Neta Guerchvitch</h1>
    <p>Select a card</p>
   <a href="./personal.html">Personal Card</a>
   <a href="./professional.html">Professional Card</a>
  </div>
</body>
</html>
